<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
</head>
<body>
    <section>
        <h1>Contact Us</h1>
        <form action="submit_form.php" method="post">
            <div>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>

            <div>
                <label for="estado">Estado:</label>
                <select name="estado" id="estado">
                    <option value=""> Selecione um estado </option>
                    <option value="SP">São Paulo</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="MG">Minas Gerais</option>
                </select>
            </div>

            <div>
                <div>
                    <label for="mensagem">Mensagem:</label>
                </div>
                <div>
                    <textarea id="mensagem" name="mensagem" rows="4" cols="50" maxlength="10"></textarea>
                </div>
            </div>

            <div>
                <input type="submit" value="Enviar Formulario">
                <input type="reset" value="Limpar Formulario">
            </div>

            <!-- <input type="checkbox" name="EN" value="ingles">EN
            <input type="checkbox" name="PT">PT
            <input type="checkbox" name="ES">ES -->
        </form>
